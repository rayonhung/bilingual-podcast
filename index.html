<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雙語 Podcast｜邊聽邊讀</title>
<style>
  :root{
    --paper:#F3F4F1; --card:#FFFFFF; --ink:#1B2430; --ink-soft:#5C6675;
    --ink-faint:#9AA2AD; --line:#E3E5E0; --accent:#1F7A6B; --accent-soft:#E7F1EF;
    --warn:#B4541F; --radius:14px; --maxw:760px; font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .brand{display:flex;align-items:center;gap:10px;padding:22px 0 18px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .brand h1{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .brand span{font-size:12px;color:var(--ink-faint);letter-spacing:.04em;margin-left:auto}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .panel h2{font-size:13px;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:12px;text-transform:uppercase}
  label{display:block;font-size:13px;color:var(--ink-soft);margin:0 0 6px}
  input[type=text],input[type=password],select{width:100%;padding:11px 13px;border:1px solid var(--line);
    border-radius:10px;background:#FBFBFA;color:var(--ink);font-size:14px;font-family:inherit;outline:none}
  input:focus,select:focus{border-color:var(--accent);background:#fff}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:140px}
  .feedrow{display:flex;gap:10px}
  .feedrow input{flex:1}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:8px;line-height:1.5}
  .hint a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-soft)}
  button{font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;border-radius:10px;padding:11px 18px;transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#19655a}
  .btn-primary:disabled{background:var(--ink-faint);cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink-soft);color:var(--ink)}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{flex:1;text-align:center;padding:9px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;color:var(--ink-soft);background:#FBFBFA;cursor:pointer}
  .tab.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

  .drop{border:1.5px dashed var(--line);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;transition:.15s;background:#FBFBFA}
  .drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft)}
  .drop .big{font-size:15px;font-weight:600;margin-bottom:4px}
  .drop .sub{font-size:12.5px;color:var(--ink-faint)}

  #eplist{margin-top:14px;max-height:340px;overflow:auto;border:1px solid var(--line);border-radius:12px}
  .ep{padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .ep:last-child{border-bottom:none}
  .ep:hover{background:var(--accent-soft)}
  .ep .t{font-size:14px;font-weight:500;line-height:1.4}
  .ep .m{font-size:11.5px;color:var(--ink-faint);margin-top:3px;display:flex;gap:8px;align-items:center}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 7px;border-radius:20px;background:var(--accent);color:#fff}
  .badge.gray{background:#EEF0EC;color:var(--ink-faint)}

  #status{display:none;text-align:center;padding:40px 20px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #statusText{font-size:14px;color:var(--ink-soft)}
  .bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin:16px auto 0;max-width:280px}
  .bar>i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}

  #player{display:none}
  .nowbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(243,244,241,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 0 calc(12px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px rgba(0,0,0,.06)}
  .nowbar .inner{display:flex;align-items:center;gap:14px}
  .play{width:46px;height:46px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer}
  .play:hover{background:#19655a}
  .play svg{width:20px;height:20px;fill:#fff}
  .meta{flex:1;min-width:0}
  .meta .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .time{font-size:11.5px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .scrub{width:100%;margin-top:5px;accent-color:var(--accent);height:4px}
  .speed{background:#fff;border:1px solid var(--line);color:var(--ink-soft);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;cursor:pointer}

  .srcnote{font-size:12px;color:var(--ink-faint);text-align:center;padding:10px 0 0}
  .more{position:sticky;top:80px;z-index:15;margin:8px auto 0;width:max-content;max-width:90%;
    background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);border-radius:20px;
    padding:6px 15px;font-size:12.5px;font-weight:600;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .more.warn{background:#FBEEE7;border-color:#EBC9B6;color:var(--warn)}
  .more.retry{cursor:pointer;text-decoration:none}
  .more.retry::after{content:"  ↻";font-weight:800}
  .more.retry:hover{background:#F9E4D8;border-color:#DAA182}
  .reprocessbtn{display:none;margin:8px auto 0;background:#fff;color:var(--warn);border:1px solid #EBC9B6;
    border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
  .reprocessbtn:hover{background:#FBEEE7}
  .lines{padding:14px 0 150px}
  .loadingline{padding:18px 14px;color:var(--ink-faint);font-size:13px;text-align:center}
  .seg{padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .15s;margin-bottom:2px}
  .seg .orig{font-size:16px;color:var(--ink);opacity:.5;transition:opacity .15s}
  .seg .trans{font-size:14.5px;color:var(--ink-soft);opacity:.45;margin-top:3px;transition:opacity .15s}
  .seg:hover{background:#fff}
  .seg.active{background:var(--card);box-shadow:0 1px 0 var(--line);position:relative}
  .seg.active::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;background:var(--accent)}
  .seg.active .orig{opacity:1;font-weight:500}
  .seg.active .trans{opacity:1;color:var(--ink)}

  .jumpback{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:45;background:var(--ink);color:#fff;padding:9px 16px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.18);display:none;align-items:center;gap:7px;cursor:pointer}
  .readytoast{position:fixed;left:50%;bottom:104px;transform:translate(-50%,16px);z-index:60;background:var(--ink);color:#fff;padding:10px 16px;border-radius:24px;font-size:13px;font-weight:650;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
  .readytoast.show{opacity:1;transform:translate(-50%,0)}
  .play.ready{animation:readyPulse .8s ease 2}
  @keyframes readyPulse{50%{box-shadow:0 0 0 9px rgba(31,122,107,.18);transform:scale(1.05)}}
  .err{background:#FBEEE7;border:1px solid #EBC9B6;color:var(--warn);padding:12px 14px;border-radius:10px;font-size:13px;margin-top:12px;display:none}
  .topactions{display:flex;justify-content:flex-end;padding:10px 0}

  .apphead{display:flex;align-items:center;gap:14px;padding:18px 0 14px;position:sticky;top:0;z-index:30;background:rgba(243,244,241,.94);backdrop-filter:blur(12px)}
  .apphead .brand{padding:0}
  .headcopy{margin-left:auto;color:var(--ink-faint);font-size:12px}
  .access{padding:16px 18px}
  .access.unlocked{display:none}
  .browse{padding-bottom:110px}
  .view{display:none}
  .view.active{display:block}
  .welcome{padding:18px 0 16px}
  .eyebrow{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:5px}
  .welcome h2{font-size:28px;line-height:1.2;font-weight:700;letter-spacing:0}
  .welcome p{font-size:14px;color:var(--ink-soft);margin-top:7px}
  .searchbox{display:flex;gap:8px;margin:14px 0 18px}
  .searchbox input{height:46px;background:#fff;border-radius:12px;padding-left:15px}
  .searchbox button{height:46px;flex:none}
  .chips{display:flex;gap:8px;overflow:auto;padding:0 0 8px;scrollbar-width:none}
  .chips::-webkit-scrollbar,.coverrail::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:12.5px}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .sectionhead{display:flex;align-items:end;justify-content:space-between;margin:24px 0 12px}
  .sectionhead h3{font-size:18px;line-height:1.2}
  .sectionhead span{font-size:12px;color:var(--ink-faint)}
  .coverrail{display:grid;grid-auto-flow:column;grid-auto-columns:138px;gap:14px;overflow:auto;padding-bottom:6px;scroll-snap-type:x proximity}
  .showcard{cursor:pointer;scroll-snap-align:start;min-width:0}
  .showcard img{display:block;width:138px;height:138px;object-fit:cover;border-radius:7px;background:#E7E9E5;box-shadow:0 5px 14px rgba(27,36,48,.09)}
  .showcard .ct{font-size:13px;font-weight:650;line-height:1.35;margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .showcard .ca{font-size:11.5px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .emptycopy{padding:24px 0;color:var(--ink-faint);font-size:13px}
  .resultgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px 14px}
  .resultgrid .showcard img{width:100%;height:auto;aspect-ratio:1}
  .browseback{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--ink-soft);padding:8px 0;margin:4px 0 14px}
  .showhero{display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:end;margin-bottom:24px}
  .showhero img{width:180px;height:180px;object-fit:cover;border-radius:8px;background:#E7E9E5;box-shadow:0 7px 20px rgba(27,36,48,.12)}
  .showhero h2{font-size:25px;line-height:1.2;margin:5px 0 7px}
  .showauthor{font-size:13px;color:var(--accent);font-weight:650}
  .showdesc{font-size:13px;color:var(--ink-soft);margin-top:11px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .episodeblock{border-top:1px solid var(--line);max-height:none!important;overflow:visible!important;border-radius:0!important}
  .episode{display:grid;grid-template-columns:1fr auto;gap:14px;padding:17px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .episode:hover .episode-title{color:var(--accent)}
  .episode-title{font-size:15px;font-weight:650;line-height:1.38}
  .episode-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .episode-meta{display:flex;align-items:center;gap:8px;color:var(--ink-faint);font-size:11.5px;margin-top:8px}
  .episode-action{align-self:center;border:1px solid var(--line);background:#fff;color:var(--accent);padding:8px 11px;font-size:12px;white-space:nowrap}
  .episode:hover .episode-action{border-color:var(--accent)}
  .catalog-loading{padding:42px 0;text-align:center;color:var(--ink-faint);font-size:13px}
  .catalog-loading .spinner{width:24px;height:24px;margin-bottom:10px}
  details.advanced{margin-top:26px;border-top:1px solid var(--line);padding-top:13px}
  details.advanced summary{cursor:pointer;color:var(--ink-faint);font-size:12px}
  details.advanced .feedrow{margin-top:10px}
  .privacy-note{font-size:11.5px;color:var(--ink-faint);margin-top:10px}

  @media(max-width:620px){
    :root{--maxw:100%}
    .wrap{padding:0 16px}
    .apphead{padding-top:14px}
    .brand h1{font-size:14px}
    .headcopy{display:none}
    .welcome h2{font-size:25px}
    .resultgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .coverrail{grid-auto-columns:126px}
    .showcard img{width:126px;height:126px}
    .showhero{grid-template-columns:112px 1fr;gap:16px;align-items:center}
    .showhero img{width:112px;height:112px}
    .showhero h2{font-size:21px}
    .showdesc{grid-column:1/-1;margin-top:-6px}
    .episode{grid-template-columns:1fr}
    .episode-action{justify-self:start}
    .panel{border-radius:12px}
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="apphead">
    <div class="brand"><span class="dot"></span><h1>雙語 Podcast</h1></div>
    <div class="headcopy">選一集，轉成你的私人雙語播放器</div>
  </header>

  <div id="setup">
    <div class="panel access" id="accessPanel">
      <h2 id="credTitle">金鑰</h2>
      <div id="groqKeyBox">
        <label for="key">Groq API 金鑰</label>
        <input type="password" id="key" placeholder="gsk_..." autocomplete="off">
        <div class="hint">免費申請：<a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> → Create API Key。只存在你這台電腦。</div>
      </div>
      <div id="appPasswordBox" style="display:none">
        <label for="appPassword">App 密碼</label>
        <div class="feedrow" id="appPasswordFields">
          <input type="password" id="appPassword" placeholder="輸入站台密碼" autocomplete="current-password">
          <button class="btn-primary" id="unlockBtn">解鎖</button>
        </div>
        <div class="hint" id="appPasswordHint">這個站台使用伺服器端 Groq key；輸入密碼後即可使用。</div>
        <div class="hint" id="authStatus"></div>
      </div>
    </div>

    <select id="lang" hidden>
      <option value="繁體中文（台灣用語）" selected>繁體中文</option>
    </select>
    <select id="quality" hidden>
      <option value="whisper-large-v3-turbo" selected>快速 turbo</option>
    </select>

    <main class="browse" id="browse">
      <section class="view active" id="homeView">
        <div class="welcome">
          <div class="eyebrow">私人雙語播放</div>
          <h2>今天想聽懂什麼？</h2>
          <p>搜尋節目，選一集產生只屬於你的逐句雙語字幕。</p>
        </div>

        <div class="searchbox">
          <input type="text" id="catalogSearch" placeholder="搜尋 Podcast、主持人或主題">
          <button class="btn-primary" id="searchBtn">搜尋</button>
        </div>

        <div class="chips" id="topicChips">
          <button class="chip on" data-query="business">商業</button>
          <button class="chip" data-query="technology">科技</button>
          <button class="chip" data-query="design">設計</button>
          <button class="chip" data-query="news">新聞</button>
          <button class="chip" data-query="science">科學</button>
          <button class="chip" data-query="culture">文化</button>
        </div>

        <div class="sectionhead">
          <h3 id="catalogTitle">值得一聽</h3>
          <span id="catalogCount"></span>
        </div>
        <div id="catalogLoading" class="catalog-loading">
          <div class="spinner"></div>
          正在找節目…
        </div>
        <div class="coverrail" id="catalogRail"></div>
        <div class="resultgrid" id="catalogGrid" style="display:none"></div>

        <details class="advanced">
          <summary>已有 RSS 連結？直接開啟</summary>
          <div class="feedrow">
            <input type="text" id="feedUrl" placeholder="貼上 Podcast RSS feed 網址">
            <button class="btn-ghost" id="loadFeed">開啟</button>
          </div>
        </details>
        <div class="privacy-note">字幕與翻譯按需產生，結果只保存在你的瀏覽器中。</div>
      </section>

      <section class="view" id="showView">
        <button class="browseback" id="showBack">← 回到探索</button>
        <div id="showLoading" class="catalog-loading">
          <div class="spinner"></div>
          正在讀取單集…
        </div>
        <div id="showContent" style="display:none">
          <div class="showhero">
            <img id="showImage" alt="">
            <div>
              <div class="eyebrow">Podcast</div>
              <h2 id="showTitle"></h2>
              <div class="showauthor" id="showAuthor"></div>
              <p class="showdesc" id="showDescription"></p>
            </div>
          </div>
          <div class="sectionhead">
            <h3>所有單集</h3>
            <span id="episodeCount"></span>
          </div>
          <div class="episodeblock" id="eplist"></div>
        </div>
      </section>
      <div class="err" id="err"></div>
    </main>
  </div>

  <!-- STATUS -->
  <div id="status" class="panel">
    <div class="spinner"></div>
    <div id="statusText">處理中…</div>
    <div class="bar"><i id="barFill"></i></div>
  </div>

  <!-- PLAYER -->
  <div id="player">
    <div class="topactions"><button class="btn-ghost" id="backBtn">← 換一集</button></div>
    <div class="srcnote" id="srcnote"></div>
    <div class="more" id="more" style="display:none"></div>
    <button class="reprocessbtn" id="reprocessBtn">重新處理整集</button>
  </div>
</div>

<div class="nowbar" id="nowbar" style="display:none">
  <div class="wrap"><div class="inner">
    <div class="play" id="playBtn" title="播放/暫停"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="meta">
      <div class="name" id="epName">—</div>
      <div class="time"><span id="cur">0:00</span> / <span id="dur">0:00</span></div>
      <input type="range" class="scrub" id="scrub" min="0" max="100" value="0">
    </div>
    <button class="speed" id="speedBtn">1×</button>
  </div></div>
</div>

<div class="jumpback" id="jumpback">↓ 回到目前播放</div>
<div class="readytoast" id="readytoast" role="status" aria-live="polite">音訊已就緒，可以播放</div>
<audio id="audio"></audio>

<script>
const $ = id => document.getElementById(id);
const CHUNK_TIMEOUT_MS = 180000;
const RETRY_CHUNK_TIMEOUT_MS = 420000;
const CACHE_PREFIX = "tx_v8_synced_audio_";
let appConfig = {serverKey:false, passwordRequired:false, authed:false};
async function parseApiResponse(r){
  const text = await r.text();
  let data = null;
  if(text){
    try{
      data = JSON.parse(text);
    }catch(e){
      const type = (r.headers.get("content-type") || "").toLowerCase();
      const renderPage = /<!doctype|<html|application loading|render/i.test(text);
      const detail = renderPage
        ? "Render 暫時回傳了網頁而不是 API 資料，服務可能正在喚醒或剛剛中斷。"
        : (type ? "伺服器回傳了無法解析的內容（"+type+"）。" : "伺服器回傳了無法解析的內容。");
      throw new Error((r.ok ? "" : "HTTP "+r.status+"：") + detail);
    }
  }
  if(!r.ok) throw new Error((data && data.error) || ("HTTP "+r.status));
  if(data === null) throw new Error("伺服器沒有回傳資料。");
  return data;
}
const apiGet = (path, timeoutMs=30000) => {
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  return fetch(path, {signal:ctrl.signal, credentials:"same-origin"})
    .then(parseApiResponse)
    .finally(()=>clearTimeout(timer));
};
const api = (path, body, timeoutMs=120000) => {
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  return fetch(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body), signal:ctrl.signal, credentials:"same-origin"})
    .then(parseApiResponse)
    .catch(err => { if(err.name==="AbortError") throw new Error("請求逾時，稍後可重試這一段。"); throw err; })
    .finally(()=>clearTimeout(timer));
};
const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
async function startFeedJob(audioUrl, timeoutMs=180000){
  let lastErr;
  for(let attempt=0;attempt<2;attempt++){
    try{
      return await api("/api/job_start", {
        audioUrl,
        model:$("quality").value,
        key:groqKey()
      }, timeoutMs);
    }catch(err){
      lastErr = err;
      const transient = /Render 暫時|HTTP 50[234]|請求逾時|Failed to fetch|網路連線/i.test(err.message || "");
      if(!transient || attempt===1) throw err;
      setStatus("Render 剛剛暫時中斷，正在自動重試音檔準備…", null);
      await wait(1800);
    }
  }
  throw lastErr;
}

// 把一批字幕送去翻譯（每 25 句一批）；report(text,pct) 負責回報進度
async function translateSegs(segs, report, onBatch){
  const target = $("lang").value, key = groqKey(), BATCH=6;
  for(let i=0;i<segs.length;i+=BATCH){
    const chunk = segs.slice(i,i+BATCH);
    report("翻譯中… "+Math.min(i+BATCH,segs.length)+" / "+segs.length+" 句", Math.round((i/segs.length)*100));
    let r, lastErr;
    for(let attempt=0;attempt<4;attempt++){
      try{ r = await api("/api/translate", {texts:chunk.map(s=>s.text), target, key}, 120000); break; }
      catch(err){ lastErr=err; if(attempt<3) await new Promise(res=>setTimeout(res, 1200*(attempt+1))); }
    }
    if(!r) throw lastErr || new Error("翻譯失敗");
    chunk.forEach((s,j)=> s.trans = (r.t&&r.t[j])||"");
    if(onBatch) onBatch(chunk);
  }
}

function persist(cacheKey){
  try{
    localStorage.setItem(cacheKey, JSON.stringify({
      segments,
      failedChunks,
      job: activeJob,
      savedAt: Date.now()
    }));
  }catch(e){}
}

function pruneResolvedFailures(job=activeJob){
  if(!job || !Array.isArray(job.starts) || !failedChunks.length || !segments.length) return 0;
  const before = failedChunks.length;
  failedChunks = failedChunks.filter(i => {
    const start = Number(job.starts[i] || 0);
    const end = Number(job.starts[i + 1] || Infinity);
    return !segments.some(s => s.start >= start - 0.25 && s.start < end - 0.25);
  });
  return before - failedChunks.length;
}

function restoreCached(raw, title, src, cacheKey){
  const data = JSON.parse(raw);
  const segs = Array.isArray(data) ? data : (data.segments || []);
  if(!Array.isArray(data) && (!data.job || !data.job.audioUrl || Date.now() - (data.savedAt || 0) > 25*60*1000)){
    localStorage.removeItem(cacheKey);
    return false;
  }
  activeCacheKey = cacheKey || activeCacheKey;
  startPlayer(title, Array.isArray(data) ? src : data.job.audioUrl, "讀取上次的同步結果");
  appendSegments(segs);
  if(Array.isArray(data)){
    showReprocess("這是舊版快取，沒有保存失敗段落清單；點此重新處理一次。");
  }else{
    activeJob = data.job || null;
    failedChunks = data.failedChunks || [];
    if(pruneResolvedFailures(activeJob)) persist(activeCacheKey);
    if(activeJob && failedChunks.length){
      showRetry("上次有 "+failedChunks.length+" 段失敗 · 點此只重試失敗段落");
    }
  }
  return true;
}

// 逐段交付：第一段好了就開播放器，其餘段在背景補上
async function runJob(job, title, src, cacheKey){
  const key=groqKey(), model=$("quality").value;
  const myRun = ++runId;
  activeJob = job; activeCacheKey = cacheKey; failedChunks = []; hideRetry();
  startPlayer(title, job.audioUrl || src, "實際播放音訊 AI 轉錄（含廣告，背景處理中…）");
  setMore("正在準備第一批雙語字幕…完成後即可開始", false);
  let okCount=0, firstErr=null;
  for(let i=0;i<job.count;i++){
    if(myRun !== runId) return;
    const report = (t)=>setMore(t);
    try{
      report("轉錄中… 第 "+(i+1)+" / "+job.count+" 段（語音轉文字）", Math.round((i/job.count)*100));
      const r = await api("/api/job_chunk", {jobId:job.jobId, index:i, model, key, attempts:2}, CHUNK_TIMEOUT_MS);
      if(myRun !== runId) return;
      let addedInThisChunk = 0;
      await translateSegs(r.segments, (t)=> report("第 "+(i+1)+"/"+job.count+" 段 · "+t,
                                                    Math.round((i/job.count)*100)),
                          (chunk)=>{
                            if(myRun !== runId) return;
                            const added = appendSegments(chunk);
                            if(added){
                              addedInThisChunk += added;
                              persist(cacheKey);
                              setMore("已可播放，背景繼續處理第 "+(i+1)+" / "+job.count+" 段", false);
                            }
                          });
      if(myRun !== runId) return;
      if(addedInThisChunk) okCount++;
    }catch(err){
      if(!firstErr) firstErr = err;
      failedChunks.push(i);
      persist(cacheKey);
      setMore("⚠ 第 "+(i+1)+" 段失敗，已記錄，稍後可單獨重試："+err.message, true);
      // 繼續試下一段，全失敗才在最後報錯；失敗段可用按鈕補抓
    }
  }
  if(!okCount) throw new Error(firstErr ? firstErr.message : "所有段落都轉錄失敗了，請稍後再試一次。");
  if(!failedChunks.length){
    persist(cacheKey);
    setMore("");
    $("srcnote").textContent = "字幕來源：實際播放音訊 AI 轉錄（含廣告，共 "+job.count+" 段）";
  }else{
    pruneResolvedFailures(job);
    if(!failedChunks.length){
      persist(cacheKey);
      setMore("");
      $("srcnote").textContent = "字幕來源：實際播放音訊 AI 轉錄（含廣告，共 "+job.count+" 段）";
      return;
    }
    showRetry("完成，但有 "+failedChunks.length+" 段失敗 · 點此只重試失敗段落");
    persist(cacheKey);
    $("srcnote").textContent = "字幕來源：實際播放音訊 AI 轉錄（含廣告）";
  }
}

async function reprocessCurrent(){
  if(!activeCacheKey || !currentSrc) return;
  localStorage.removeItem(activeCacheKey);
  runId++;
  audio.pause();
  segments = [];
  failedChunks = [];
  hideRetry(); hideReprocess();
  try{
    setStatus("準備音檔…（重新處理）", null);
    const job = await startFeedJob(currentSrc);
    await runJob(job, currentTitle || "Podcast", currentSrc, activeCacheKey);
  }catch(err){
    backToSetup();
    showErr(err.message);
  }
}

async function refreshJobForRetry(){
  if(!currentSrc){
    throw new Error("這是上傳檔案的舊工作階段，重啟後無法重建音檔；請重新上傳一次。");
  }
  setMore("工作階段已過期，正在重新準備音檔，只補失敗段落…", false);
  const job = await startFeedJob(currentSrc, 600000);
  activeJob = job;
  return job;
}

async function retryFailedChunks(){
  if(!activeJob || !failedChunks.length) return;
  if(pruneResolvedFailures(activeJob)){
    persist(activeCacheKey);
    if(!failedChunks.length){
      setMore("");
      return;
    }
  }
  const retrying = [...failedChunks];
  failedChunks = [];
  hideRetry();
  const key=groqKey(), model=$("quality").value;
  let refreshedJob = false;
  for(let n=0;n<retrying.length;n++){
    const i = retrying[n];
    const retryLabel = "重試失敗段落 "+(n+1)+" / "+retrying.length+"（原第 "+(i+1)+" / "+activeJob.count+" 段）";
    try{
      setMore(retryLabel, false);
      let r;
      try{
        r = await api("/api/job_chunk", {
          jobId:activeJob.jobId,
          index:i,
          model,
          key,
          attempts:2,
          splitFallback:true
        }, RETRY_CHUNK_TIMEOUT_MS);
      }catch(err){
        const expired = /工作階段已過期|段落索引超出範圍/.test(err.message || "");
        if(!expired || refreshedJob) throw err;
        refreshedJob = true;
        await refreshJobForRetry();
        setMore(retryLabel+" · 已重新準備音檔，繼續補這段", false);
        r = await api("/api/job_chunk", {
          jobId:activeJob.jobId,
          index:i,
          model,
          key,
          attempts:2,
          splitFallback:true
        }, RETRY_CHUNK_TIMEOUT_MS);
      }
      await translateSegs(r.segments, (t)=>setMore(retryLabel+" · "+t),
                          (chunk)=>{
                            if(appendSegments(chunk)) persist(activeCacheKey);
                          });
    }catch(err){
      failedChunks.push(i);
      setMore("⚠ "+retryLabel+" 失敗："+err.message, true);
    }
  }
  if(failedChunks.length) showRetry("仍有 "+failedChunks.length+" 段失敗 · 點此再重試");
  else setMore("");
  persist(activeCacheKey);
}

async function processEpisode(ep){
  hideErr();
  if(!(await ensureAccess())) return;
  let stage = "檢查單集資料";
  ep = {...ep, audio:absoluteUrl(ep.audio), transcript:absoluteUrl(ep.transcript)};
  if(!/^https?:\/\//i.test(ep.audio)) {
    showErr("這一集沒有有效的音檔網址，請換一集或換一個 RSS feed。");
    return;
  }
  const cacheKey = CACHE_PREFIX+ep.audio+"_"+$("lang").value;
  activeCacheKey = cacheKey; currentTitle = ep.title; currentSrc = ep.audio; currentMode = "feed";
  try{
    stage = "讀取上次結果";
    const cached = localStorage.getItem(cacheKey);
    if(cached && restoreCached(cached, ep.title, ep.audio, cacheKey)) return;
  }catch(e){}
  try{
    // 一律轉錄實際下載並播放的同一份音訊。Podcast 的動態廣告通常不在官方字幕內，
    // 若直接套官方字幕，廣告之後的整條時間軸都會錯位。
    stage = "下載並準備同步音檔";
    setStatus("準備同步音檔…（廣告也會一起轉錄）", null);
    const job = await startFeedJob(ep.audio);
    stage = "開啟播放器與轉錄";
    await runJob(job, ep.title, ep.audio, cacheKey);
  }catch(err){
    backToSetup();
    showErr(stage+"失敗："+(err && err.message ? err.message : String(err)));
  }
}

// ---------- player ----------
function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+":"+String(s%60).padStart(2,"0"); }
function audioSrc(src){
  src = absoluteUrl(src);
  if(/^https?:\/\//i.test(src)) return "/api/audio?url=" + encodeURIComponent(src);
  return src;
}

function absoluteUrl(url){
  if(!url) return "";
  if(url.startsWith("//")) return "https:" + url;
  try{ return new URL(url, location.href).href; }
  catch(e){ return url; }
}

// 開啟播放器並備好一個空的字幕容器（內容由 appendSegments 逐段加入）
function startPlayer(name, src, source){
  $("status").style.display="none"; $("setup").style.display="none";
  $("player").style.display="block"; $("nowbar").style.display="block";
  $("epName").textContent = name;
  $("srcnote").textContent = source ? ("字幕來源：" + source) : "";
  setMore("");
  hideRetry(); hideReprocess();

  segments = [];
  const p=$("player");
  [...p.querySelectorAll(".lines")].forEach(n=>n.remove());
  const cont = document.createElement("div");
  cont.className = "lines"; cont.id = "lines";
  cont.innerHTML = '<div class="loadingline" id="linesLoading">字幕背景處理中…</div>';
  p.appendChild(cont);

  $("cur").textContent="0:00"; $("dur").textContent="載入中";
  $("scrub").value=0;
  audioReadyNotified=false;
  clearTimeout(readyToastTimer);
  $("readytoast").classList.remove("show");
  playBtn.classList.remove("ready");
  document.title=defaultPageTitle;
  audio.pause();
  audio.removeAttribute("crossorigin");
  audio.removeAttribute("src");
  try{ audio.load(); }catch(e){}
  audio.preload = "metadata";
  audio.setAttribute("src", audioSrc(src));
  try{ audio.load(); }catch(e){}
  lastActive=-1; autoScroll=true; $("jumpback").style.display="none";
}

// 把新的一批字幕加進畫面（沿用全域 segments 的索引，timeupdate 才對得上）
function normSegText(text){
  return (text || "").toLowerCase().replace(/[^\p{L}\p{N}]+/gu, " ").trim();
}
function appendSegments(segs){
  const cont = $("lines");
  if(!cont) return 0;
  const loading = $("linesLoading");
  if(loading) loading.remove();
  let added = 0;
  segs.forEach(s=>{
    const nt = normSegText(s.text);
    const exists = segments.some(x => {
      const xt = normSegText(x.text);
      return (Math.abs(x.start-s.start) < 4 && nt && xt && nt === xt) ||
             (Math.abs(x.start-s.start) < 1 && x.text === s.text);
    });
    if(!exists){ segments.push(s); added++; }
  });
  segments.sort((a,b)=>a.start-b.start);
  if(added) renderSegments();
  return added;
}

function renderSegments(){
  const cont = $("lines");
  if(!cont) return;
  cont.innerHTML = "";
  segments.forEach((s,i)=>{
    const d=document.createElement("div"); d.className="seg"; d.dataset.i=i;
    d.innerHTML='<div class="orig"></div><div class="trans"></div>';
    d.querySelector(".orig").textContent = s.text;
    d.querySelector(".trans").textContent = s.trans||"";
    d.addEventListener("click", ()=>{ audio.currentTime=s.start; audio.play(); });
    cont.appendChild(d);
  });
}

const playBtn=$("playBtn"), playIconPath=document.querySelector("#playIcon path");
const ICON_PLAY='M8 5v14l11-7z', ICON_PAUSE='M6 5h4v14H6zM14 5h4v14h-4z';
playBtn.addEventListener("click", async ()=>{
  if(!segments.length){
    setMore("正在準備第一批雙語字幕…完成後即可開始", false);
    return;
  }
  if(audio.paused){
    try{ await audio.play(); }
    catch(err){ setMore("音訊還沒載入成功，請稍等一下再播放。"+(err.message?(" "+err.message):""), true); }
  }else{
    audio.pause();
  }
});
audio.addEventListener("play", ()=> playIconPath.setAttribute("d",ICON_PAUSE));
audio.addEventListener("pause", ()=> playIconPath.setAttribute("d",ICON_PLAY));
audio.addEventListener("loadedmetadata", ()=> $("dur").textContent=Number.isFinite(audio.duration)?fmt(audio.duration):"直播");
function announceAudioReady(){
  if(audioReadyNotified) return;
  audioReadyNotified=true;
  const toast=$("readytoast");
  toast.textContent="音訊已就緒，可以播放";
  toast.classList.add("show");
  playBtn.classList.add("ready");
  clearTimeout(readyToastTimer);
  readyToastTimer=setTimeout(()=>{
    toast.classList.remove("show");
    playBtn.classList.remove("ready");
  },6000);
  if($("more").textContent.startsWith("音訊還沒載入")) setMore("");
  if(document.hidden) document.title="音訊好了｜雙語 Podcast";
  if(navigator.vibrate) navigator.vibrate(120);
  if(document.hidden && "Notification" in window && Notification.permission==="granted"){
    try{ new Notification("雙語 Podcast", {body:"音訊已就緒，可以開始播放。"}); }catch(e){}
  }
}
audio.addEventListener("canplay", announceAudioReady);
audio.addEventListener("canplaythrough", announceAudioReady);
audio.addEventListener("error", ()=>{
  const code = audio.error ? audio.error.code : "?";
  setMore("音訊載入失敗（錯誤碼 "+code+"）。這個 podcast 來源可能擋瀏覽器播放。", true);
});
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) document.title=defaultPageTitle;
});

let lastActive=-1, autoScroll=true;
audio.addEventListener("timeupdate", ()=>{
  $("cur").textContent=fmt(audio.currentTime);
  if(audio.duration) $("scrub").value=(audio.currentTime/audio.duration)*100;
  const t=audio.currentTime; let idx=-1;
  for(let i=0;i<segments.length;i++){ if(t>=segments[i].start && t<segments[i].end){idx=i;break;} if(t<segments[i].start) break; }
  if(idx!==-1 && idx!==lastActive){
    const segs=document.querySelectorAll(".seg");
    if(segs[lastActive]) segs[lastActive].classList.remove("active");
    if(segs[idx]){ segs[idx].classList.add("active"); if(autoScroll) segs[idx].scrollIntoView({behavior:"smooth",block:"center"}); }
    lastActive=idx;
  }
});
$("scrub").addEventListener("input", ()=>{ if(audio.duration) audio.currentTime=($("scrub").value/100)*audio.duration; });

const speeds=[1,1.25,1.5,0.75]; let si=0;
$("speedBtn").addEventListener("click", ()=>{ si=(si+1)%speeds.length; audio.playbackRate=speeds[si]; $("speedBtn").textContent=speeds[si]+"×"; });

let scrollT;
function pauseScroll(){
  if($("player").style.display !== "block" || !segments.length) return;
  autoScroll=false;
  $("jumpback").style.display="flex";
  clearTimeout(scrollT);
}
window.addEventListener("wheel", pauseScroll, {passive:true});
window.addEventListener("touchmove", pauseScroll, {passive:true});
$("jumpback").addEventListener("click", ()=>{ autoScroll=true; $("jumpback").style.display="none"; const a=document.querySelector(".seg.active"); if(a) a.scrollIntoView({behavior:"smooth",block:"center"}); });

$("backBtn").addEventListener("click", ()=>{ audio.pause(); backToSetup(); lastActive=-1; autoScroll=true; });
$("more").addEventListener("click", ()=>{
  const m=$("more");
  if(m.classList.contains("retry") || (failedChunks.length && m.textContent.includes("重試"))) retryFailedChunks();
});
$("more").addEventListener("keydown", e=>{
  if((e.key==="Enter" || e.key===" ") && failedChunks.length){
    e.preventDefault();
    retryFailedChunks();
  }
});
$("reprocessBtn").addEventListener("click", reprocessCurrent);
document.addEventListener("keydown", async e=>{
  if(e.code==="Space" && $("player").style.display==="block" && e.target.tagName!=="INPUT"){
    e.preventDefault();
    if(!segments.length){
      setMore("正在準備第一批雙語字幕…完成後即可開始", false);
      return;
    }
    if(audio.paused){
      try{ await audio.play(); }
      catch(err){ setMore("音訊還沒載入成功，請稍等一下再播放。"+(err.message?(" "+err.message):""), true); }
    }else{
      audio.pause();
    }
  }
});
</script>
